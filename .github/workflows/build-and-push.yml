name: Build and Push

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: quizapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Image tags
        id: meta
        run: |
          HOST="${{ secrets.REGISTRY_HOST }}"
          REPO="${{ secrets.REGISTRY_REPOSITORY }}"
          if [ -z "$REPO" ]; then
            REPO="${{ env.IMAGE_NAME }}"
          fi
          IMAGE="${HOST}/${REPO}"
          echo "tags=${IMAGE}:${GITHUB_SHA::7},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "Pushing ${IMAGE}:latest and ${IMAGE}:${GITHUB_SHA::7}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Smaller attestations; large layer PUTs still need Cloudflare DNS-only on the registry host
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
